<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ page_title|default:"Smart Commerce AI" }}{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}{{ meta_description|default:"AI-powered eCommerce search. Find products by describing your problem." }}{% endblock %}" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page_title|default:'Smart Commerce AI' }}" />
  <meta property="og:description" content="{{ meta_description|default:'Find products by describing your problem.' }}" />
  <meta property="og:type" content="website" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <!-- Custom CSS -->
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  <link rel="stylesheet" href="{% static 'css/components.css' %}" />

  {% block extra_head %}{% endblock %}
</head>
<body>
  {% include "navbar.html" %}

  <main id="main-content">
    {% block content %}{% endblock %}
  </main>

  {% include "footer.html" %}

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom JS -->
  <script src="{% static 'js/animations.js' %}"></script>
  <script src="{% static 'js/search.js' %}"></script>

  {% block extra_js %}{% endblock %}
</body>
</html>
